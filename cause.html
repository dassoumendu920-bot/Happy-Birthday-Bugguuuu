<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My special princess! 💖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="./cause.css">
    <style>
       
    </style>
</head>
<body>
    <video autoplay loop muted playsinline id="bg-video">
    <source src="./video.mp4" type="video/mp4">
     </video>
    
    <div class="container">
        <h1>Happy Birthday Janviiii 💖</h1>
        
        <div id="reasons-container"></div>
        
        <button class="shuffle-button">plss ek aur bar pyar se 😭 💕</button>
        <div class="reason-counter"></div>

        <div class="ending-section">
            <div class="teddy-hug">
                <img src="./d1.jpg" alt="Teddy Hug">
            </div>
            <div class="ending-text">umm insab se jyada chidh maat ! 💖</div>
        </div>
    </div>

    <script src="cause.js"></script>
    <audio id="birthday-music" src="./music.mp3" loop></audio>

    <script>
    window.addEventListener('DOMContentLoaded', () => {
        const music = document.getElementById('birthday-music');
        const isPlaying = localStorage.getItem('musicPlaying');
        const savedTime = localStorage.getItem('musicCurrentTime');

        if (music && isPlaying === 'true') {
            if (savedTime) {
                music.currentTime = parseFloat(savedTime);
            }
            // Resumes smoothly because the user already interacted on Page 1
            music.play().catch(err => console.log("Playback bridge failed:", err));
        }

        // Keep updating the saved time right before leaving this page
        window.addEventListener('beforeunload', () => {
            if (music) {
                localStorage.setItem('musicCurrentTime', music.currentTime);
            }
        });
    });
    </script>
    
</body>
</html>
